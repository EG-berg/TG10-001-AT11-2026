<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central TG 10-001</title>

<style>
:root {
    --verde:#002200;
    --verde-escuro:#001100;
    --amarelo:#ffcc00;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Segoe UI',system-ui;
    background:#0a140a;
    color:#eee;
}

header{
    background:linear-gradient(var(--verde),var(--verde-escuro));
    text-align:center;
    padding:30px;
    border-bottom:6px solid var(--amarelo);
}

.player{
    text-align:center;
    padding:20px;
    background:#0f1f0f;
    border-bottom:5px solid var(--amarelo);
}

.now{color:var(--amarelo);margin-bottom:10px;}

audio{width:100%;max-width:600px;}

.container{max-width:1200px;margin:auto;padding:20px;}

.tabs{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:15px;
}

.tab{
    padding:10px 20px;
    border:2px solid #224422;
    border-radius:20px;
    cursor:pointer;
}

.tab.active{
    background:var(--amarelo);
    color:#002200;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

/* CARD */
.card{
    background:#112211;
    border:2px solid #224422;
    padding:20px;
    border-radius:12px;
    position:relative;
    overflow:hidden;
}

/* protege conteúdo */
.card > *:not(.favorite-btn){
    position:relative;
    z-index:1;
}

/* ⭐ CORREÇÃO FINAL */
.favorite-btn{
    position:absolute;
    top:10px;
    right:12px;
    width:auto !important; /* 🔥 ESSENCIAL */
    height:auto;
    z-index:999;
    background:none;
    border:none;
    font-size:22px;
    cursor:pointer;
    padding:0;
}

/* botão geral (continua normal) */
button{
    width:100%;
    padding:10px;
    margin-top:8px;
    border:none;
    border-radius:20px;
    cursor:pointer;
}

/* estilos */
.play{background:var(--verde);color:white;}
.download{background:var(--amarelo);color:#002200;}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:2px solid var(--amarelo);
    border-radius:20px;
    background:#001a00;
    color:white;
}

footer{
    text-align:center;
    padding:20px;
    background:var(--verde);
    border-top:6px solid var(--amarelo);
}
</style>
</head>

<body>

<header>
<h1>TG 10-001</h1>
<p>Sentinela do Coreaú</p>
</header>

<div class="player">
<div class="now" id="now">Selecione um toque 🎺</div>
<audio id="audio" controls></audio>
<button onclick="stopAudio()">⛔ Parar</button>
</div>

<div class="container">

<div class="tabs">
<div class="tab active" data-tab="todos">Todos</div>
<div class="tab" data-tab="favoritos">⭐ Favoritos</div>
</div>

<input id="search" placeholder="Buscar...">

<div id="grid" class="grid"></div>

</div>

<footer>
TG 10-001 • Camocim-CE
</footer>

<script>
document.addEventListener('DOMContentLoaded',()=>{

const toques = [
{nome:"Hino do Exército Brasileiro",desc:"Oficial",url:"https://cb.es.gov.br/Media/CBMES/mp3/hinos%20e%20cancoes/cancao_do_exercito.mp3"},
{nome:"Hino Nacional Brasileiro",desc:"Oficial",url:"https://www.pmpr.pr.gov.br/sites/default/arquivos_restritos/files/audio/2018-11/hino_nacional_brasileiro.mp3"},
{nome:"Hino Nacional Instrumental",desc:"Instrumental",url:"https://upload.wikimedia.org/wikipedia/commons/9/9b/Hino_Nacional_Brasileiro_instrumental.ogg"},
{nome:"Canção do Expedicionário",desc:"FEB",url:"https://cb.es.gov.br/Media/CBMES/mp3/hinos%20e%20cancoes/cancao_do_expedicionario.mp3"},

{nome:"Sentido",desc:"Posição",url:"https://cpmlondrina.com.br/wp-content/uploads/2018/06/48-sentido.mp3"},
{nome:"Descansar",desc:"Descanso",url:"https://cpmlondrina.com.br/wp-content/uploads/2018/06/20-descansar.mp3"},
{nome:"À Vontade",desc:"À vontade",url:"https://cpmlondrina.com.br/wp-content/uploads/2018/06/01-a_vontade.mp3"},
{nome:"Firme",desc:"Firme",url:"https://cpmlondrina.com.br/wp-content/uploads/2018/06/28-firme.mp3"},
{nome:"Cobrir",desc:"Cobrir",url:"https://cpmlondrina.com.br/wp-content/uploads/2018/06/16-cobrir.mp3"},
{nome:"Apresentar Arma",desc:"Apresentar arma",url:"https://cpmlondrina.com.br/wp-content/uploads/2018/06/06-apresentar_arma.mp3"},
{nome:"Ombro Arma",desc:"Ombro arma",url:"https://cpmlondrina.com.br/wp-content/uploads/2018/06/39-ombro_arma.mp3"},
{nome:"Descansar Arma",desc:"Descansar arma",url:"https://cpmlondrina.com.br/wp-content/uploads/2018/06/21-descansar_arma.mp3"},
{nome:"Cruzar Arma",desc:"Cruzar arma",url:"https://cpmlondrina.com.br/wp-content/uploads/2018/06/19-cruzar_arma.mp3"},
{nome:"Direita Volver",desc:"Direita",url:"https://cpmlondrina.com.br/wp-content/uploads/2018/06/22-direita_volver.mp3"},
{nome:"Esquerda Volver",desc:"Esquerda",url:"https://cpmlondrina.com.br/wp-content/uploads/2018/06/27-esquerda_volver.mp3"},
{nome:"Meia Volta Volver",desc:"Meia volta",url:"https://cpmlondrina.com.br/wp-content/uploads/2018/06/35-meia_volta_volver.mp3"},
{nome:"Ordinário Marché",desc:"Marcha",url:"https://cpmlondrina.com.br/wp-content/uploads/2018/06/41-ordinario_marche.mp3"},
{nome:"Marcar Passo",desc:"Marcar",url:"https://cpmlondrina.com.br/wp-content/uploads/2018/06/33-marcar_passo.mp3"},
{nome:"Acelerado",desc:"Rápido",url:"https://cpmlondrina.com.br/wp-content/uploads/2018/06/02-acelerado.mp3"},
{nome:"Alto",desc:"Parar",url:"https://cpmlondrina.com.br/wp-content/uploads/2018/06/04-alto.mp3"},
{nome:"Silêncio",desc:"Silêncio",url:"https://cpmlondrina.com.br/wp-content/uploads/2018/06/49-silencio.mp3"}
];

const grid=document.getElementById('grid');
const audio=document.getElementById('audio');
const now=document.getElementById('now');

let favoritos=[];
let currentTab='todos';

function loadFav(){
const f=localStorage.getItem('fav');
if(f) favoritos=JSON.parse(f);
}

function saveFav(){
localStorage.setItem('fav',JSON.stringify(favoritos));
}

function toggleFav(nome){
favoritos.includes(nome)
? favoritos=favoritos.filter(n=>n!==nome)
: favoritos.push(nome);
saveFav();
render();
}

function render(){
grid.innerHTML="";
let lista=toques;

if(currentTab==='favoritos'){
lista=lista.filter(t=>favoritos.includes(t.nome));
}

lista.forEach(t=>{
const el=document.createElement('div');
el.className='card';

el.innerHTML=`
<button class="favorite-btn">${favoritos.includes(t.nome)?"⭐":"☆"}</button>
<h3>${t.nome}</h3>
<p>${t.desc}</p>
<button class="play">▶️ Tocar</button>
<button class="download">⬇️ Baixar</button>
`;

el.querySelector('.favorite-btn').onclick=(e)=>{
e.stopPropagation();
toggleFav(t.nome);
};

el.querySelector('.play').onclick=()=>{
audio.src=t.url;
audio.play();
now.textContent="Tocando: "+t.nome;
};

el.querySelector('.download').onclick=()=>{
const a=document.createElement('a');
a.href=t.url;
a.download=t.nome+".mp3";
a.click();
};

grid.appendChild(el);
});
}

window.stopAudio=function(){
audio.pause();
audio.currentTime=0;
};

document.querySelectorAll('.tab').forEach(tab=>{
tab.onclick=()=>{
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
tab.classList.add('active');
currentTab=tab.dataset.tab;
render();
};
});

loadFav();
render();

});
</script>

</body>
</html>
