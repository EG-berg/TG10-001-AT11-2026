<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Toques - TG 10-001 Sentinela do Coreaú</title>
    <style>
        :root {
            --verde: #003300;
            --amarelo: #ffcc00;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0f1f0f;
            color: #eee;
            line-height: 1.6;
        }
        header {
            background: linear-gradient(var(--verde), #001a00);
            padding: 20px;
            text-align: center;
            border-bottom: 6px solid var(--amarelo);
        }
        .logo {
            font-size: 4rem;
            margin-bottom: 8px;
        }
        h1 { font-size: 2.4rem; margin-bottom: 5px; }
        .subtitulo { color: var(--amarelo); font-size: 1.3rem; }

        .player {
            background: #112211;
            padding: 15px;
            text-align: center;
            border-bottom: 4px solid var(--amarelo);
        }
        .player-info {
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: var(--amarelo);
        }

        .search {
            width: 100%;
            max-width: 600px;
            margin: 20px auto;
            padding: 15px;
            font-size: 1.1rem;
            border: 3px solid var(--amarelo);
            border-radius: 50px;
            background: #001a00;
            color: white;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .card {
            background: #112211;
            border-radius: 12px;
            padding: 20px;
            border: 2px solid #224422;
            transition: all 0.3s;
        }
        .card:hover {
            transform: scale(1.05);
            border-color: var(--amarelo);
            box-shadow: 0 0 15px var(--amarelo);
        }

        .card h3 {
            color: var(--amarelo);
            margin-bottom: 8px;
        }

        .btn-play {
            background: var(--verde);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1.4rem;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-play:hover { background: var(--amarelo); color: var(--verde); }

        footer {
            background: var(--verde);
            text-align: center;
            padding: 25px;
            margin-top: 40px;
            font-size: 0.95rem;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">🪖🎺</div>
        <h1>TG 10-001 • Sentinela do Coreaú</h1>
        <p class="subtitulo">CENTRAL DE TOQUES DE CORNETA</p>
        <p style="margin-top:10px;">Facilitando as instruções • Exército Brasileiro</p>
    </header>

    <div class="player" id="player">
        <div class="player-info" id="now-playing">Toque selecionado aparecerá aqui</div>
        <audio id="audioPlayer" controls style="width:100%; max-width:700px;"></audio>
    </div>

    <div class="container">
        <input type="text" id="search" class="search" placeholder="🔎 Buscar toque (ex: sentido, apresentar arma, marcha...)">

        <div class="grid" id="toquesGrid">
            <!-- Os cartões são gerados pelo JavaScript -->
        </div>
    </div>

    <footer>
        <strong>Tiro de Guerra 10-001 "Sentinela do Coreaú"</strong> • Camocim - CE<br>
        Exército Brasileiro • 1917 — 2026
    </footer>

    <script>
        // Lista de toques com áudios reais (funciona imediatamente)
        const toques = [
            { nome: "Sentido", desc: "Todos em posição de sentido", url: "https://cpmlondrina.com.br/wp-content/uploads/2018/06/48-sentido.mp3" },
            { nome: "Descansar", desc: "Posição de descanso", url: "https://cpmlondrina.com.br/wp-content/uploads/2018/06/20-descansar.mp3" },
            { nome: "À Vontade", desc: "Ficar à vontade", url: "https://cpmlondrina.com.br/wp-content/uploads/2018/06/01-a_vontade.mp3" },
            { nome: "Firme", desc: "Ficar em posição firme", url: "https://cpmlondrina.com.br/wp-content/uploads/2018/06/28-firme.mp3" },
            { nome: "Cobrir", desc: "Alinhamento da formatura", url: "https://cpmlondrina.com.br/wp-content/uploads/2018/06/16-cobrir.mp3" },
            { nome: "Apresentar Arma", desc: "Apresentar arma ao comandante", url: "https://cpmlondrina.com.br/wp-content/uploads/2018/06/06-apresentar_arma.mp3" },
            { nome: "Ombro Arma", desc: "Arma no ombro", url: "https://cpmlondrina.com.br/wp-content/uploads/2018/06/39-ombro_arma.mp3" },
            { nome: "Descansar Arma", desc: "Descansar arma no chão", url: "https://cpmlondrina.com.br/wp-content/uploads/2018/06/21-descansar_arma.mp3" },
            { nome: "Cruzar Arma", desc: "Cruzar arma à frente", url: "https://cpmlondrina.com.br/wp-content/uploads/2018/06/19-cruzar_arma.mp3" },
            { nome: "Direita Volver", desc: "Direita volver", url: "https://cpmlondrina.com.br/wp-content/uploads/2018/06/22-direita_volver.mp3" },
            { nome: "Esquerda Volver", desc: "Esquerda volver", url: "https://cpmlondrina.com.br/wp-content/uploads/2018/06/27-esquerda_volver.mp3" },
            { nome: "Meia Volta Volver", desc: "Meia volta volver", url: "https://cpmlondrina.com.br/wp-content/uploads/2018/06/35-meia_volta_volver.mp3" },
            { nome: "Ordinário Marché", desc: "Marcha ordinária", url: "https://cpmlondrina.com.br/wp-content/uploads/2018/06/41-ordinario_marche.mp3" },
            { nome: "Marcar Passo", desc: "Marcar passo no lugar", url: "https://cpmlondrina.com.br/wp-content/uploads/2018/06/33-marcar_passo.mp3" },
            { nome: "Acelerado", desc: "Marcha acelerada", url: "https://cpmlondrina.com.br/wp-content/uploads/2018/06/02-acelerado.mp3" },
            { nome: "Alto", desc: "Parar imediatamente", url: "https://cpmlondrina.com.br/wp-content/uploads/2018/06/04-alto.mp3" },
            { nome: "Silêncio", desc: "Silêncio total", url: "https://cpmlondrina.com.br/wp-content/uploads/2018/06/49-silencio.mp3" },
            { nome: "Alvorada", desc: "Toque de alvorada", url: "https://cpmlondrina.com.br/wp-content/uploads/2018/06/05-alvorada.mp3" }
        ];

        const audio = document.getElementById('audioPlayer');
        const nowPlaying = document.getElementById('now-playing');
        const grid = document.getElementById('toquesGrid');

        function renderToques(filteredToques) {
            grid.innerHTML = '';
            filteredToques.forEach(toque => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h3>${toque.nome}</h3>
                    <p>${toque.desc}</p>
                    <button class="btn-play" data-url="${toque.url}" data-nome="${toque.nome}">
                        ▶️ Tocar Toque
                    </button>
                    <a href="${toque.url}" download="${toque.nome}.mp3" style="display:block; margin-top:10px; text-align:center; color:var(--amarelo); font-size:0.9rem;">
                        ⬇️ Baixar MP3
                    </a>
                `;
                grid.appendChild(card);
            });
        }

        // Evento de clique nos botões play
        document.addEventListener('click', e => {
            if (e.target.classList.contains('btn-play')) {
                const url = e.target.getAttribute('data-url');
                const nome = e.target.getAttribute('data-nome');
                
                audio.src = url;
                audio.play();
                
                nowPlaying.textContent = `🎺 Tocando: ${nome}`;
            }
        });

        // Busca em tempo real
        document.getElementById('search').addEventListener('input', e => {
            const termo = e.target.value.toLowerCase();
            const filtrados = toques.filter(t => 
                t.nome.toLowerCase().includes(termo) || 
                t.desc.toLowerCase().includes(termo)
            );
            renderToques(filtrados);
        });

        // Renderiza todos os toques ao carregar
        renderToques(toques);
    </script>
</body>
</html>
